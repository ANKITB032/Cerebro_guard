<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CerebroGuard · Phishing Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" integrity="sha512-aNMyYYxdIxIaot0Y1/PLuEu3eipGCmsEUBrUq+7aVyPGMFH8z0eTP0tkqAvv34wkoI6ZKTan1ksD+0NNQpH9A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f8f9fb;
    --surface:     #ffffff;
    --surface-2:   #f1f4f8;
    --border:      #e2e8f0;
    --border-focus:#94a3b8;
    --blue:        #2563eb;
    --blue-light:  #eff6ff;
    --blue-dark:   #1d4ed8;
    --red:         #dc2626;
    --red-light:   #fef2f2;
    --amber:       #d97706;
    --amber-light: #fffbeb;
    --green:       #16a34a;
    --green-light: #f0fdf4;
    --text:        #0f172a;
    --text-2:      #475569;
    --text-3:      #94a3b8;
    --font:        'DM Sans', sans-serif;
    --font-mono:   'DM Mono', monospace;
    --radius:      0.75rem;
    --radius-sm:   0.375rem;
    --shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow:      0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
    --shadow-lg:   0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.875rem;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ───────────────────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 3.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }

  .logo { display: flex; align-items: center; gap: 0.625rem; }

  .logo-text {
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .logo-text span { color: var(--blue); }

  .logo-tag {
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--text-3);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 0.125rem 0.5rem;
    border-radius: 2rem;
    letter-spacing: 0;
  }

  .engine-badges { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

  .badge {
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.3125rem 0.75rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    color: var(--text-3);
    background: var(--surface);
    white-space: nowrap;
    letter-spacing: 0;
    text-transform: none;
  }

  .badge.active {
    background: var(--blue-light);
    border-color: #bfdbfe;
    color: var(--blue);
  }

  /* Gmail connect button */
  #gmailBtn {
    font-family: var(--font);
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.3125rem 0.875rem;
    border-radius: 2rem;
    border: 1px solid #bbf7d0;
    background: #f0fdf4;
    color: var(--green);
    text-decoration: none;
    transition: background 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  #gmailBtn:hover { background: #dcfce7; box-shadow: var(--shadow-sm); }

  /* Sync button */
  #syncBtn {
    font-family: var(--font);
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.3125rem 0.875rem;
    border-radius: 2rem;
    border: 1px solid #bfdbfe;
    background: var(--blue-light);
    color: var(--blue);
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    text-transform: none;
    letter-spacing: 0;
  }
  #syncBtn:hover { background: #dbeafe; box-shadow: var(--shadow-sm); }

  /* ── Main layout ──────────────────────────────────────────────────────── */
  main {
    max-width: 72rem;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  /* ── Panel ────────────────────────────────────────────────────────────── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .panel:hover { box-shadow: var(--shadow); }

  .panel-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
  }

  .panel-title {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .panel-num {
    font-size: 0.6875rem;
    color: var(--text-3);
    font-family: var(--font-mono);
    margin-left: auto;
    background: var(--surface-2);
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
  }

  .panel-body { padding: 1.25rem; }

  .input-panel { grid-column: 1; }

  /* ── Form fields ──────────────────────────────────────────────────────── */
  .field { margin-bottom: 1rem; }
  .field:last-of-type { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 0.375rem;
    text-transform: none;
    letter-spacing: 0;
  }

  input, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.875rem;
    padding: 0.5625rem 0.75rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  input::placeholder, textarea::placeholder { color: var(--text-3); }

  input:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  textarea { resize: vertical; min-height: 7.5rem; line-height: 1.5; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  /* ── Analyze button ───────────────────────────────────────────────────── */
  .btn-analyze {
    width: 100%;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--blue);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: var(--font);
    font-size: 0.875rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    min-height: 2.75rem;
  }

  .btn-analyze:hover {
    background: var(--blue-dark);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.30);
  }
  .btn-analyze:active { transform: scale(0.99); }

  .btn-analyze.loading {
    background: var(--border-focus);
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-analyze .spinner {
    display: none;
    width: 1rem; height: 1rem;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }

  .btn-analyze.loading .btn-label { display: none; }
  .btn-analyze.loading .spinner   { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result panel ─────────────────────────────────────────────────────── */
  .result-panel { grid-column: 2; display: flex; flex-direction: column; gap: 1rem; }

  /* ── Gauge ────────────────────────────────────────────────────────────── */
  .gauge-panel .panel-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.25rem 1.5rem;
  }

  .gauge-wrap { position: relative; width: 12.5rem; height: 6.875rem; }
  .gauge-wrap svg { overflow: visible; }

  .gauge-score {
    position: absolute;
    bottom: 0;
    width: 100%;
    text-align: center;
  }

  .gauge-number {
    font-size: 3.25rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
    transition: color 0.4s;
  }

  .gauge-label {
    font-size: 0.6875rem;
    color: var(--text-3);
    margin-top: 0.125rem;
    font-weight: 500;
  }

  .verdict-badge {
    margin-top: 1.25rem;
    padding: 0.375rem 1.25rem;
    border-radius: 2rem;
    font-size: 0.8125rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--surface-2);
    color: var(--text-3);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }

  .verdict-badge.phishing   { background: var(--red-light);   color: var(--red);   border-color: #fecaca; }
  .verdict-badge.suspicious { background: var(--amber-light); color: var(--amber); border-color: #fde68a; }
  .verdict-badge.safe       { background: var(--green-light); color: var(--green); border-color: #bbf7d0; }

  .confidence-row {
    margin-top: 0.875rem;
    display: flex;
    align-items: center;
    gap: 0.625rem;
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--text-3);
    width: 100%;
    max-width: 16rem;
  }

  .conf-bar { flex: 1; height: 0.25rem; background: var(--border); border-radius: 2rem; overflow: hidden; }
  .conf-fill { height: 100%; background: var(--blue); border-radius: 2rem; width: 0; }

  /* ── Evidence panel ───────────────────────────────────────────────────── */
  .evidence-panel { flex: 1; }

  .evidence-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 22rem;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .evidence-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.625rem;
    align-items: start;
    background: var(--surface);
    opacity: 0;        /* anime.js controls reveal */
    transform: translateY(6px);
  }

  .sev-bar {
    width: 0.1875rem;
    border-radius: 2rem;
    align-self: stretch;
    min-height: 1.875rem;
  }
  .sev-bar.critical { background: var(--red); }
  .sev-bar.high     { background: #f97316; }
  .sev-bar.medium   { background: var(--amber); }
  .sev-bar.low      { background: var(--green); }

  .ev-label { font-size: 0.75rem; font-weight: 600; color: var(--text); margin-bottom: 0.125rem; }
  .ev-desc  { font-size: 0.6875rem; color: var(--text-2); line-height: 1.45; }

  .ev-score {
    font-size: 0.75rem;
    font-weight: 700;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .ev-score.pos { color: var(--red); }
  .ev-score.neg { color: var(--green); }

  /* ── Entity chips ─────────────────────────────────────────────────────── */
  .entity-chips { display: flex; flex-wrap: wrap; gap: 0.375rem; }

  .chip {
    padding: 0.1875rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 0.25rem;
    font-size: 0.6875rem;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--text-2);
  }

  .chip.MONEY  { background: var(--amber-light); border-color: #fde68a; color: var(--amber); }
  .chip.ORG    { background: var(--blue-light);  border-color: #bfdbfe; color: var(--blue); }
  .chip.PERSON { background: #f5f3ff;             border-color: #ddd6fe; color: #7c3aed; }
  .chip.GPE    { background: var(--green-light);  border-color: #bbf7d0; color: var(--green); }
  .chip.DATE   { background: var(--surface-2);    border-color: var(--border); color: var(--text-3); }

  /* ── Graph stats ──────────────────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }

  .stat-box {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.875rem 0.75rem;
    text-align: center;
    background: var(--surface-2);
  }

  .stat-val {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .stat-key {
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 0.25rem;
  }

  /* ── Empty state ──────────────────────────────────────────────────────── */
  .empty-state { text-align: center; padding: 2.5rem 1.25rem; color: var(--text-3); }
  .empty-icon  { font-size: 1.75rem; margin-bottom: 0.75rem; opacity: 0.4; }
  .empty-text  { font-size: 0.75rem; font-weight: 500; text-transform: none; letter-spacing: 0; }

  /* ── Toast ────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.8125rem;
    font-weight: 500;
    padding: 0.875rem 1.125rem;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    opacity: 0;
    transform: translateY(0.5rem);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    max-width: 20rem;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ───────────────────────────────────────────────────────── */
  @media (max-width: 48rem) {
    header { padding: 0 1rem; gap: 0.75rem; }
    .logo-tag { display: none; }
    .engine-badges .badge:not(#gmailBtn):not(#syncBtn) { display: none; }
    main { grid-template-columns: 1fr; padding: 1rem 1rem 4rem; }
    .input-panel, .result-panel { grid-column: 1; }
    .field-row { grid-template-columns: 1fr; }
    .gauge-wrap { width: 10rem; height: 5.5rem; }
    .gauge-number { font-size: 2.5rem; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 48.0625rem) and (max-width: 64rem) {
    main { padding: 1.5rem 1rem 4rem; gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-text">Cerebro<span>Guard</span></span>
    <span class="logo-tag">v2.0 // Phishing Detection</span>
  </div>
  <div class="engine-badges">
    <span class="badge active">Neo4j Graph</span>
    <span class="badge active">spaCy NLP</span>
    <span class="badge active">Pattern Analysis</span>
    <a href="/api/connect" id="gmailBtn" class="badge">
    ⬡ Connect Gmail
    </a>
    <button id="syncBtn" onclick="syncGraph()" class="badge">
      ⟳ Sync Graph
    </button>
  </div>
</header>

<main>
  <div class="panel input-panel">
    <div class="panel-header">
      <span class="panel-title">Email Intake</span>
      <span class="panel-num">01</span>
    </div>
    <div class="panel-body">
      <div class="field-row">
        <div class="field">
          <label>Sender</label>
          <input type="email" id="sender" placeholder="attacker@evil.com" />
        </div>
        <div class="field">
          <label>Recipient</label>
          <input type="email" id="recipient" placeholder="victim@corp.com" />
        </div>
      </div>
      <div class="field">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="URGENT: Action required" />
      </div>
      <div class="field">
        <label>Body</label>
        <textarea id="body" placeholder="Paste email body here..."></textarea>
      </div>
      <div class="field">
        <label>CC Recipients (comma-separated)</label>
        <input type="text" id="cc" placeholder="a@b.com, c@d.com" />
      </div>
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
        <span class="btn-label">ANALYZE</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>

  <div class="result-panel">
    <div class="panel gauge-panel">
      <div class="panel-header">
        <span class="panel-title">Risk Score</span>
        <span class="panel-num">02</span>
      </div>
      <div class="panel-body">
        <div id="gaugeEmpty" class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-text">Awaiting Analysis</div>
        </div>
        <div id="gaugeResult" style="display:none; flex-direction:column; align-items:center;">
          <div class="gauge-wrap">
            <svg width="200" height="110" viewBox="0 0 200 110" style="width:100%;height:100%;">
              <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="var(--border)" stroke-width="12" stroke-linecap="round"/>
              <path id="gaugeArc" d="M20,100 A80,80 0 0,1 180,100"
                fill="none" stroke="var(--blue)" stroke-width="12" stroke-linecap="round"
                stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
            </svg>
            <div class="gauge-score">
              <div class="gauge-number" id="gaugeNumber">0</div>
              <div class="gauge-label">/ 100</div>
            </div>
          </div>
          <div class="verdict-badge" id="verdictBadge">—</div>
          <div class="confidence-row">
            <span>CONFIDENCE</span>
            <div class="conf-bar"><div class="conf-fill" id="confFill"></div></div>
            <span id="confPct">—</span>
          </div>
        </div>
      </div>
    </div>

    <div class="panel evidence-panel">
      <div class="panel-header">
        <span class="panel-title">Evidence Factors</span>
        <span class="panel-num">03</span>
      </div>
      <div class="panel-body">
        <div id="evidenceEmpty" class="empty-state" style="padding:20px;">
          <div class="empty-text">No evidence yet</div>
        </div>
        <div id="evidenceList" class="evidence-list" style="display:none;"></div>
      </div>
    </div>

    <div class="panel" id="entitiesPanel" style="display:none;">
      <div class="panel-header">
        <span class="panel-title">NLP Entities</span>
        <span class="panel-num">04</span>
      </div>
      <div class="panel-body">
        <div class="entity-chips" id="entityChips"></div>
      </div>
    </div>

    <div class="panel" id="graphPanel" style="display:none;">
      <div class="panel-header">
        <span class="panel-title">Graph Intelligence</span>
        <span class="panel-num">05</span>
      </div>
      <div class="panel-body">
        <div class="stat-grid" id="statGrid"></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  function setGauge(score) {
    const arc   = document.getElementById('gaugeArc');
    const color = score >= 70 ? '#dc2626' : score >= 35 ? '#d97706' : '#16a34a';
    const target = 251.2 - (score / 100) * 251.2;

    anime({
      targets: arc,
      strokeDashoffset: [251.2, target],
      stroke: color,
      easing: 'easeOutExpo',
      duration: 1100,
    });

    anime({
      targets: document.getElementById('gaugeNumber'),
      color: color,
      easing: 'easeOutQuad',
      duration: 600,
    });
  }

  function animateCount(el, target, duration = 900) {
    const obj = { val: 0 };
    anime({
      targets: obj,
      val: target,
      round: 1,
      duration,
      easing: 'easeOutExpo',
      update() { el.textContent = obj.val; },
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  async function syncGraph() {
    showToast('Syncing emails to graph... this may take 20 seconds.');
    try {
      const res = await fetch('https://cerebro-guard.vercel.app/api/sync-graph');
      const data = await res.json();
      if (data.status === 'ok') {
        showToast(`Success! Processed ${data.emails_processed} emails, added ${data.pairs_merged} connections.`);
      } else {
        showToast('Sync failed: ' + data.error);
      }
    } catch(e) {
      showToast('Sync error: ' + e.message);
    }
  }

  async function analyze() {
    const sender    = document.getElementById('sender').value.trim();
    const recipient = document.getElementById('recipient').value.trim();
    const subject   = document.getElementById('subject').value.trim();
    const body      = document.getElementById('body').value.trim();
    const ccRaw     = document.getElementById('cc').value.trim();
    const cc        = ccRaw ? ccRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

    if (!sender || !recipient) { showToast('Sender and recipient are required.'); return; }

    const btn = document.getElementById('analyzeBtn');
    btn.classList.add('loading');

    try {
      const res = await fetch('https://cerebro-guard.vercel.app/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender, recipient, subject, body, cc }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      renderResult(await res.json());
    } catch(e) {
      showToast('Analysis failed: ' + e.message);
    } finally {
      btn.classList.remove('loading');
    }
  }

  function renderResult(data) {
    const { risk_score, verdict, confidence, evidence, graph_stats, nlp_entities } = data;

    document.getElementById('gaugeEmpty').style.display  = 'none';
    document.getElementById('gaugeResult').style.display = 'flex';

    animateCount(document.getElementById('gaugeNumber'), Math.round(risk_score));
    setTimeout(() => setGauge(risk_score), 50);

    const badge = document.getElementById('verdictBadge');
    badge.textContent = verdict.toUpperCase();
    badge.className   = `verdict-badge ${verdict}`;

    const confPct = Math.round(confidence * 100);
    document.getElementById('confPct').textContent = confPct + '%';
    anime({
      targets: document.getElementById('confFill'),
      width: confPct + '%',
      easing: 'easeOutExpo',
      duration: 900,
      delay: 200,
    });

    const listEl = document.getElementById('evidenceList');
    const empEl  = document.getElementById('evidenceEmpty');

    if (evidence && evidence.length) {
      empEl.style.display  = 'none';
      listEl.style.display = 'flex';
      listEl.innerHTML     = '';

      const sorted = evidence
        .slice()
        .sort((a, b) => Math.abs(b.score_contribution) - Math.abs(a.score_contribution));

      sorted.forEach((ev) => {
        const pos  = ev.score_contribution > 0;
        const item = document.createElement('div');
        item.className = 'evidence-item';
        item.innerHTML = `
          <div class="sev-bar ${ev.severity}"></div>
          <div>
            <div class="ev-label">${esc(ev.label)}</div>
            <div class="ev-desc">${esc(ev.description)}</div>
          </div>
          <div class="ev-score ${pos ? 'pos' : 'neg'}">${pos ? '+' : ''}${ev.score_contribution}</div>
        `;
        listEl.appendChild(item);
      });

      // Staggered reveal via anime.js
      anime({
        targets: listEl.querySelectorAll('.evidence-item'),
        opacity: [0, 1],
        translateY: [8, 0],
        easing: 'easeOutQuart',
        duration: 380,
        delay: anime.stagger(55, { start: 80 }),
      });
    } else {
      empEl.style.display  = 'block';
      listEl.style.display = 'none';
    }

    const entPanel = document.getElementById('entitiesPanel');
    const chips    = document.getElementById('entityChips');
    if (nlp_entities && nlp_entities.length) {
      entPanel.style.display = 'block';
      chips.innerHTML = '';
      const seen = new Set();
      nlp_entities.forEach(ent => {
        const key = ent.text + ent.label;
        if (seen.has(key)) return;
        seen.add(key);
        const c = document.createElement('span');
        c.className   = `chip ${ent.label}`;
        c.textContent = `${ent.text} · ${ent.label}`;
        chips.appendChild(c);
      });
    } else {
      entPanel.style.display = 'none';
    }

    const graphPanel = document.getElementById('graphPanel');
    const statGrid   = document.getElementById('statGrid');
    if (graph_stats && graph_stats.status !== 'unavailable' && graph_stats.status !== 'error') {
      graphPanel.style.display = 'block';
      statGrid.innerHTML = '';
      const statMap = {
        sender_known:    { label: 'Sender Known',  fmt: v => v ? 'YES' : 'NO' },
        recipient_known: { label: 'Recip. Known',  fmt: v => v ? 'YES' : 'NO' },
        prior_contact:   { label: 'Prior Contact', fmt: v => v ? 'YES' : 'NO' },
        sender_degree:   { label: 'Connections',   fmt: v => v },
        email_weight:    { label: 'Emails Shared', fmt: v => v },
        total_nodes:     { label: 'Network Size',  fmt: v => v.toLocaleString() },
      };
      Object.entries(statMap).forEach(([key, conf]) => {
        if (!(key in graph_stats)) return;
        const box = document.createElement('div');
        box.className = 'stat-box';
        box.innerHTML = `<div class="stat-val">${conf.fmt(graph_stats[key])}</div><div class="stat-key">${conf.label}</div>`;
        statGrid.appendChild(box);
      });
    } else {
      graphPanel.style.display = 'none';
    }
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
  });
</script>
</body>
</html>
